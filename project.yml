name: LLMKeyboard
options:
  bundleIdPrefix: com.bogdanripa
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    DEVELOPMENT_TEAM: Y6SUP9Q5H2
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"

targets:
  LLMKeyboard:
    type: application
    platform: iOS
    sources:
      - App
      - Shared
    dependencies:
      - target: LLMKeyboardExt
        embed: true
    entitlements:
      path: App/LLMKeyboard.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.bogdanripa.llmkeyboard
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: LLM Keys
        UILaunchScreen: {}
        UISupportedInterfaceOrientations~iphone:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        ITSAppUsesNonExemptEncryption: false
        LSApplicationCategoryType: public.app-category.utilities
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bogdanripa.llmkeyboard
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        OTHER_LDFLAGS: "-weak_framework FoundationModels"
        INFOPLIST_KEY_CFBundleDisplayName: LLM Keys

  LLMKeyboardExt:
    type: app-extension
    platform: iOS
    sources:
      - Keyboard
      - Shared
    entitlements:
      path: Keyboard/LLMKeyboardExt.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.bogdanripa.llmkeyboard
    info:
      path: Keyboard/Info.plist
      properties:
        CFBundleDisplayName: LLM Keys
        NSExtension:
          NSExtensionPointIdentifier: com.apple.keyboard-service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).KeyboardViewController
          NSExtensionAttributes:
            IsASCIICapable: true
            PrefersRightToLeft: false
            PrimaryLanguage: en-US
            RequestsOpenAccess: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bogdanripa.llmkeyboard.keyboard
        APPLICATION_EXTENSION_API_ONLY: true
        OTHER_LDFLAGS: "-weak_framework FoundationModels"
        SKIP_INSTALL: true
